<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziękujemy za wiadomość - Ustalmy Grawer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .thank-you-container {
            text-align: center;
            padding: 100px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .thank-you-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            color: #4a0404;
            margin-bottom: 20px;
        }
        .thank-you-container p {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .btn-home {
            display: inline-block;
            background-color: #4a0404;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            font-family: Arial, sans-serif;
            /* Usunąłem stąd kolor, żeby nie było konfliktu */
        }
        .btn-home:hover {
            background-color: #e7e4d5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="thank-you-container">
        <h1>Dziękujemy!</h1>
        <p>Twoja wiadomość została wysłana pomyślnie. <br> 
        Odpowiemy na nią tak szybko, jak to możliwe – zazwyczaj zajmuje nam to do 24 godzin.</p>
        
        <a href="index.html" class="btn-home" style="color: #ffffff !important; text-decoration: none !important;">POWRÓT DO STRONY GŁÓWNEJ</a>
    </div>

</body>
</html>
